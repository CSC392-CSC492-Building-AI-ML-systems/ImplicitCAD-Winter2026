services:
  # ImplicitCAD engine: runs implicitsnap (port 8080) for jsTHREE rendering
  # Also has extopenscad binary for STL compilation
  implicitcad:
    build:
      context: ./docker
      dockerfile: Dockerfile.implicitcad
    container_name: implicitcad-engine
    ports:
      - "8080:8080"
    volumes:
      - implicitcad-bin:/opt/implicitcad-bin
    restart: unless-stopped

  # Node.js API server: compile, chat, file management, provider routing
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: implicitcad-server
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=4000
      - EXTOPENSCAD=/opt/implicitcad-bin/extopenscad
      - WORKSPACE=/workspace
      - LLM_COMMAND=${LLM_COMMAND:-echo "LLM not configured"}
      - COMPILE_TIMEOUT=${COMPILE_TIMEOUT:-60}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ACTIVE_PROVIDER=${ACTIVE_PROVIDER:-ollama}
      - ACTIVE_MODEL=${ACTIVE_MODEL:-}
    volumes:
      - ${WORKSPACE_DIR:-./_workspace}:/workspace
      - implicitcad-bin:/opt/implicitcad-bin:ro
    depends_on:
      - implicitcad
    restart: unless-stopped

  # React frontend served by nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: implicitcad-frontend
    ports:
      - "3000"
    depends_on:
      - server
      - implicitcad
    restart: unless-stopped

volumes:
  implicitcad-bin:
